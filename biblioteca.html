<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Motivações Pra Vida Kids</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <div class="container">
    <header class="cabecalho">
      <img src="icone-512.png" alt="Logo" class="logo">
      <h1>📚 Minhas Histórias</h1>
      <nav class="navegacao">
        <a href="criar-historia.html">✨ Nova História</a>
        <a href="perfil.html">👤 Meu Perfil</a>
      </nav>
    </header>

    <main class="conteudo">
      <div class="lista-historias" id="lista-historias">
        <p>Carregando suas histórias...</p>
      </div>
    </main>
  </div>

  <script type="module">
    import { usuarioLogado } from './services/clerk.js';
    import { supabase, idUsuarioAtual } from './services/supabase.js';

    if (!usuarioLogado()) {
      window.location.href = '/login.html';
    }

    async function carregarHistorias() {
      const { data, error } = await supabase
        .from('stories')
        .select('*')
        .eq('user_id', idUsuarioAtual())
        .order('criado_em', { ascending: false });

      const container = document.getElementById('lista-historias');

      if (error || !data || data.length === 0) {
        container.innerHTML = `<p>Você ainda não criou nenhuma história. <a href="criar-historia.html">Crie a primeira!</a></p>`;
        return;
      }

      container.innerHTML = data.map(story => `
        <div class="historia-card">
          \( {story.imagens?.[0]?.url ? `<img src=" \){story.imagens[0].url}" alt="Capa">` : ''}
          <div>
            <h3>${story.titulo}</h3>
            <small>${new Date(story.criado_em).toLocaleDateString('pt-BR')}</small>
            <p>${story.texto_completo.substring(0, 150)}...</p>
          </div>
        </div>
      `).join('');
    }

    carregarHistorias();
  </script>
</body>
</html>

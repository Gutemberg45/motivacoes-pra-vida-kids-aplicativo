<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>
</head>

<body>

  <h1>👤 Perfil da Criança</h1>

  <p id="user"></p>

  <script>
    const usuario = localStorage.getItem("usuario");

    console.log("👤 CONFIRMAÇÃO: perfil carregado");

    if (!usuario) {
      console.log("⛔ CONFIRMAÇÃO: usuário não logado");
      window.location.href = "login.html";
    } else {
      document.getElementById("user").innerText =
        "Bem-vindo: " + usuario;

      console.log("🔓 CONFIRMAÇÃO: acesso liberado");
    }
  </script>

</body>
</html>

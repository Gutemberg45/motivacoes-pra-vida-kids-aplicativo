<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motivações Pra Vida Kids</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .tv {
      width: 90%;
      max-width: 500px;
      background: #111827;
      border: 3px solid #4ade80;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.3);
    }

    h1 {
      color: #4ade80;
      font-size: 20px;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 10px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #4ade80;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #22c55e;
    }
  </style>
</head>

<body>

  <div class="tv">
    <h1>✔️ Confirmação de Inicialização</h1>

    <p>
      O aplicativo foi carregado com sucesso.<br/>
      Todas as funções estão prontas para uso.<br/><br/>

      📝 Você está entrando no <b>Motivações Pra Vida Kids</b>, um espaço
      feito para histórias, aprendizado e diversão.
    </p>

    <button onclick="continuar()">Continuar</button>
  </div>

  <script>
    console.log("📺 CONFIRMAÇÃO: tela TV carregada com sucesso");

    function continuar() {
      console.log("➡️ CONFIRMAÇÃO: usuário clicou em continuar");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motivações Pra Vida Kids - Aplicativo</title>
  <meta name="description" content="Aplicativo de histórias personalizadas onde a criança é a protagonista">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icone-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icone-512.png">
  <meta name="theme-color" content="#2c5f2d">
  <style>
    :root {
      --verde-floresta: #2c5f2d;
      --verde-suave: #97bc62;
      --azul-ceu: #a8d1e7;
      --dourado-suave: #f9dc5c;
      --branco: #ffffff;
      --texto: #2b2b2b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: linear-gradient(180deg, var(--azul-ceu) 0%, var(--verde-suave) 100%);
      min-height: 100vh;
      color: var(--texto);
    }
    .cabecalho {
      background-color: rgba(255,255,255,0.9);
      padding: 1rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .cabecalho h1 { color: var(--verde-floresta); font-size: 1.8rem; }
    .conteudo { max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    .painel {
      background-color: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .botao {
      display: block;
      width: 100%;
      padding: 1rem;
      margin: 0.8rem 0;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .botao-principal { background-color: var(--verde-floresta); color: white; }
    .botao-principal:hover { background-color: #23ad24; }
    .botao-secundario { background-color: var(--dourado-suave); color: var(--texto); }
    .aviso { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #444; }
  </style>
</head>
